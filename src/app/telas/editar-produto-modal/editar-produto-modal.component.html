<div class="form-container">

  <mat-card class="form-card">
    <h2 class="titulo">Editar de Produto</h2>

    <form class="form-produto" [formGroup]="formulario"]  >

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Id do Produto</mat-label>
        <input matInput placeholder="Digite o Id do produto"  formControlName="id">
      </mat-form-field>


      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nome do Produto</mat-label>
        <input matInput placeholder="Digite o nome do produto"  formControlName="nome">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Preço</mat-label>
        <input matInput type="number" placeholder="Digite o preço" formControlName="preco">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Estoque</mat-label>
        <input matInput type="number" placeholder="Quantidade em estoque" formControlName="estoque">
      </mat-form-field>

      <div class="radio-container">
        <mat-label class="radio-title">Status do Produto</mat-label>

        <mat-radio-group class="radio-group" formControlName="statusProduto">
          <mat-radio-button value="ATIVO">Ativo</mat-radio-button>
          <mat-radio-button value="INATIVO">Inativo</mat-radio-button>
        </mat-radio-group>
      </div>

      <button mat-raised-button color="primary" class="botao" (click)="editar()" >
        Salvar Produto
      </button>

    </form>
  </mat-card>

</div>
